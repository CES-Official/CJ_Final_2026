<style>
  .logo-root { padding: 2.5rem 0; font-family: sans-serif; }
  .logo-heading { text-align: center; margin-bottom: 1.75rem; }
  .logo-eyebrow { display: inline-block; font-size: 21px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #0f6e56; background: #e1f5ee; padding: 4px 14px; border-radius: 20px; margin-bottom: 0.6rem; }
  .logo-title { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 0.25rem; }
  .logo-sub { font-size: 13px; color: var(--color-text-secondary); margin: 0; }

  .logo-belt-wrap { overflow: hidden; width: 100%; position: relative; }
  .logo-belt-wrap::before, .logo-belt-wrap::after {
    content: ''; position: absolute; top: 0; bottom: 0; width: 80px; z-index: 2; pointer-events: none;
  }
  .logo-belt-wrap::before { left: 0; background: linear-gradient(to right, var(--color-background-primary, #fff), transparent); }
  .logo-belt-wrap::after  { right: 0; background: linear-gradient(to left, var(--color-background-primary, #fff), transparent); }

  .logo-belt {
    display: flex; gap: 40px; width: max-content;
    animation: scrollLogos 40s linear infinite;
  }
  .logo-belt:hover { animation-play-state: paused; }

  @keyframes scrollLogos {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  .logo-tile {
    flex-shrink: 0; width: 200px; height:  150px;
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; cursor: default;
    transition: border-color 0.2s;
  }
  .logo-tile:hover { border-color: #9fe1cb; }

  .logo-tile img {
    width: 200px; height: 150px; object-fit: contain;
    filter: grayscale(1); opacity: 0.65;
    transition: filter 0.25s, opacity 0.25s;
  }
  .logo-tile:hover img { filter: grayscale(0); opacity: 1; }

  .logo-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; width: 100%; height: 100%; }
  .logo-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .logo-name { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; }
</style>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Load Header
      fetch("header.html")
        .then(response => response.text())
        .then(data => {
          document.getElementById("header").innerHTML = data;
        })
        .catch(err => console.error("Header load error:", err));

      // Load Footer
      fetch("footer.html")
        .then(response => response.text())
        .then(data => {
          document.getElementById("footer").innerHTML = data;
        })
        .catch(err => console.error("Footer load error:", err));
    });
