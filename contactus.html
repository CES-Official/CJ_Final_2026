  <link href="assets/img/favicon.png" rel="icon">

<link href="assets/css/main.css" rel="stylesheet">

<script>
    async function loadHtmlPartial(url, targetElementId) {
      try {
        const response = await fetch(url);

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const html = await response.text();
        document.getElementById(targetElementId).innerHTML = html;

      } catch (error) {
        console.error('Error fetching HTML partial:', error);

        document.getElementById(targetElementId).innerHTML =
          '<p>Error loading content.</p>';
      }
    }

    document.addEventListener("DOMContentLoaded", () => {

      loadHtmlPartial("./header.html", "header");

      loadHtmlPartial("./footer.html", "footer");

      /* ===== EMAIL ===== */
      const email = ["corp","@","cyberlearningindia",".","com"].join("");

      const emailLink = document.getElementById("email-link");

      if (emailLink) {
        emailLink.href = "mailto:" + email;
      }

    });
  </script>
